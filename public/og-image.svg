<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a3a6b"/>

  <!-- Accent bar top -->
  <rect y="0" width="1200" height="8" fill="#f5c842"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="#0f2447" opacity="0.6"/>
  <circle cx="150" cy="530" r="120" fill="#0f2447" opacity="0.4"/>

  <!-- Emergency badge -->
  <rect x="60" y="60" width="320" height="44" rx="22" fill="#f5c842"/>
  <text x="220" y="88" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a3a6b" text-anchor="middle">EMERGENCIA — 24 JUNIO 2026</text>

  <!-- Main title -->
  <text x="60" y="200" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="white">Venezuela</text>
  <text x="60" y="290" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="white">necesita</text>
  <text x="60" y="380" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="#f5c842">camas</text>

  <!-- Subtitle -->
  <text x="60" y="440" font-family="Arial, sans-serif" font-size="26" fill="#93c5fd">Fabricamos literas y entregamos colchones</text>
  <text x="60" y="472" font-family="Arial, sans-serif" font-size="26" fill="#93c5fd">a refugios afectados por el terremoto.</text>

  <!-- Meta numbers -->
  <rect x="60" y="510" width="200" height="80" rx="16" fill="#f5c842"/>
  <text x="160" y="545" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="#1a3a6b" text-anchor="middle">100</text>
  <text x="160" y="570" font-family="Arial, sans-serif" font-size="16" fill="#1a3a6b" text-anchor="middle">literas</text>

  <rect x="280" y="510" width="200" height="80" rx="16" fill="rgba(255,255,255,0.15)"/>
  <text x="380" y="545" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">200</text>
  <text x="380" y="570" font-family="Arial, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">colchones</text>

  <!-- Bed icon area -->
  <rect x="820" y="130" width="320" height="370" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Bunk bed illustration -->
  <!-- Frame vertical left -->
  <rect x="870" y="160" width="20" height="320" rx="6" fill="#f5c842"/>
  <!-- Frame vertical right -->
  <rect x="1070" y="160" width="20" height="320" rx="6" fill="#f5c842"/>
  <!-- Top bed frame -->
  <rect x="860" y="175" width="240" height="14" rx="5" fill="white"/>
  <!-- Top mattress -->
  <rect x="870" y="189" width="220" height="60" rx="8" fill="#3b82f6" opacity="0.9"/>
  <rect x="880" y="199" width="200" height="10" rx="4" fill="#60a5fa"/>
  <!-- Middle support -->
  <rect x="860" y="260" width="240" height="10" rx="4" fill="#f5c842"/>
  <!-- Bottom bed frame  -->
  <rect x="860" y="285" width="240" height="14" rx="5" fill="white"/>
  <!-- Bottom mattress -->
  <rect x="870" y="299" width="220" height="60" rx="8" fill="#3b82f6" opacity="0.9"/>
  <rect x="880" y="309" width="200" height="10" rx="4" fill="#60a5fa"/>
  <!-- Legs -->
  <rect x="870" y="370" width="16" height="90" rx="5" fill="#f5c842"/>
  <rect x="1074" y="370" width="16" height="90" rx="5" fill="#f5c842"/>
  <!-- Ladder -->
  <rect x="1058" y="220" width="10" height="150" rx="3" fill="rgba(255,255,255,0.4)"/>
  <rect x="1040" y="250" width="28" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>
  <rect x="1040" y="290" width="28" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>
  <rect x="1040" y="330" width="28" height="6" rx="3" fill="rgba(255,255,255,0.4)"/>

  <!-- Bottom accent -->
  <rect y="622" width="1200" height="8" fill="#f5c842"/>
</svg>
